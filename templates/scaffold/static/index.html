<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{project-name}} | WiBX LABS</title>
    <style>
        :root {
            --bg-deep: #0c0c0c;
            --surface: #141414;
            --primary: #00ff70; /* Neon Green */
            --primary-orange: #ff5a00; /* Neon Orange */
            --foreground: #ebf7ee;
            --muted: #ababab;
            --destructive: #f06a6f;
            --radius: 10px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-deep);
            color: var(--foreground);
            font-family: 'Red Hat Display', 'Helvetica Neue', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 500px;
            background: var(--surface);
            padding: 30px;
            border-radius: var(--radius);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.4);
            text-align: center;
        }

        h1 {
            font-size: 24px;
            margin-bottom: 20px;
            letter-spacing: -0.02em;
        }

        p {
            color: var(--muted);
            line-height: 1.6;
            margin-bottom: 25px;
        }

        .btn-primary {
            background: var(--primary);
            color: #141414;
            border: none;
            padding: 12px 24px;
            border-radius: 999px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 280ms ease;
            text-transform: uppercase;
            font-size: 14px;
            letter-spacing: 0.05em;
        }

        .btn-primary:hover {
            transform: scale(1.05);
            box-shadow: 0 0 15px rgba(0, 255, 112, 0.3);
        }

        .logo {
            width: 60px;
            height: auto;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
